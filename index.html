<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinese Pinyin Phonetic Chart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 1.5rem;
    }

    .header .label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888780;
      margin-bottom: 4px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 500;
      color: #D62828;
      font-family: Georgia, serif;
      letter-spacing: 0.04em;
    }

    .header .subtitle {
      font-size: 13px;
      color: #888780;
      margin-top: 4px;
    }

    .scroll-wrap {
      overflow-x: auto;
      border-top: 0.5px solid #D3D1C7;
    }

    table {
      border-collapse: collapse;
      min-width: 100%;
      font-size: 12px;
    }

    thead th {
      padding: 7px 8px;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: #D62828;
      letter-spacing: 0.04em;
      border-bottom: 0.5px solid #D3D1C7;
      white-space: nowrap;
      position: sticky;
      top: 0;
      background: #ffffff;
    }

    thead th.initial-header {
      text-align: left;
      color: #888780;
      min-width: 40px;
      position: sticky;
      left: 0;
      z-index: 2;
      background: #ffffff;
    }

    tbody tr:nth-child(even) td {
      background: #fafaf9;
    }

    tbody tr:nth-child(odd) td {
      background: #ffffff;
    }

    tbody td {
      padding: 7px 8px;
      text-align: center;
      color: #444441;
      border-bottom: 0.5px solid #F1EFE8;
      white-space: nowrap;
      min-width: 48px;
    }

    tbody td.initial {
      font-weight: 500;
      color: #2C2C2A;
      text-align: left;
      padding-left: 10px;
      border-right: 0.5px solid #D3D1C7;
      position: sticky;
      left: 0;
      z-index: 1;
    }

    tbody tr:nth-child(even) td.initial { background: #fafaf9; }
    tbody tr:nth-child(odd) td.initial { background: #ffffff; }

    tbody td.empty {
      color: #D3D1C7;
    }

    .branding {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 0.5px solid #D3D1C7;
    }

    .branding p {
      font-size: 13px;
      color: #D62828;
      letter-spacing: 0.08em;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .source {
      font-size: 11px;
      color: #B4B2A9;
      margin-top: 6px;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <p class="label">phonetic reference</p>
    <h1>Chinese Pinyin Phonetic Chart &nbsp;拼音表</h1>
    <p class="subtitle">Simplified from Standard Pinyin &nbsp;·&nbsp; * denotes retroflex vowel</p>
  </div>

  <div class="scroll-wrap">
    <table id="pinyin-table"></table>
  </div>

  <div class="branding">
    <p>Red Bamboo Chinese &nbsp;·&nbsp; 红竹中文</p>
    <p class="source">Data source: Standard Pinyin</p>
  </div>

</div>

<script>
  const finals = [
    '-a','-ai','-ao','-an','-ang',
    '-e','-ei','-en','-eng','-er',
    '-o','-ou','-ong',
    '-i','-i*',
    '-ia','-iao','-ie','-iou','-ian','-iang','-in','-ing','-iong',
    '-u','-ua','-uai','-uei','-uo','-uan','-uang','-uen','-ueng',
    '-ü','-üe','-üan','-ün'
  ];

  // Each row: [initial_label, ...cells matching finals order]
  // '' = empty cell
  const rows = [
    ['—',  'a','ai','ao','an','ang',  'e','ei','en','eng','er',  'o','ou','ong',  'yi','',  'ya','yao','ye','you','yan','yang','yin','ying','yong',  'wu','wa','wai','wei','wo','wan','wang','wen','weng',  'yu','yue','yuan','yun'],
    ['b-', 'ba','bai','bao','ban','bang',  '','bei','ben','beng','',  'bo','','',  'bi','',  '','biao','bie','','bian','','bin','bing','',  'bu','','','','','','','','',  '','','',''],
    ['p-', 'pa','pai','pao','pan','pang',  '','pei','pen','peng','',  'po','pou','',  'pi','',  '','piao','pie','','pian','','pin','ping','',  'pu','','','','','','','','',  '','','',''],
    ['m-', 'ma','mai','mao','man','mang',  'me','mei','men','meng','',  'mo','mou','',  'mi','',  '','miao','mie','miu','mian','','min','ming','',  'mu','','','','','','','','',  '','','',''],
    ['f-', 'fa','','','fan','fang',  '','fei','fen','feng','',  'fo','fou','',  '','',  '','','','','','','','','',  'fu','','','','','','','','',  '','','',''],
    ['d-', 'da','dai','dao','dan','dang',  'de','','den','deng','',  '','dou','dong',  'di','',  '','diao','die','diu','dian','','','ding','',  'du','','','dui','duo','duan','','dun','',  '','','',''],
    ['t-', 'ta','tai','tao','tan','tang',  'te','','','teng','',  '','tou','tong',  'ti','',  '','tiao','tie','','tian','','','ting','',  'tu','','','tui','tuo','tuan','','tun','',  '','','',''],
    ['n-', 'na','nai','nao','nan','nang',  'ne','nei','nen','neng','',  '','nou','nong',  'ni','',  '','niao','nie','niu','nian','niang','nin','ning','',  'nu','','','','nuo','nuan','','','',  'nü','nüe','',''],
    ['l-', 'la','lai','lao','lan','lang',  'le','lei','','leng','',  'lo','lou','long',  'li','',  'lia','liao','lie','liu','lian','liang','lin','ling','',  'lu','','','','luo','luan','','lun','',  'lü','lüe','',''],
    ['z-', 'za','zai','zao','zan','zang',  'ze','zei','zen','zeng','',  '','zou','zong',  'zi','',  '','','','','','','','','',  'zu','','','zui','zuo','zuan','','zun','',  '','','',''],
    ['c-', 'ca','cai','cao','can','cang',  'ce','','cen','ceng','',  '','cou','cong',  'ci','',  '','','','','','','','','',  'cu','','','cui','cuo','cuan','','cun','',  '','','',''],
    ['s-', 'sa','sai','sao','san','sang',  'se','','sen','seng','',  '','sou','song',  'si','',  '','','','','','','','','',  'su','','','sui','suo','suan','','sun','',  '','','',''],
    ['zh-','zha','zhai','zhao','zhan','zhang',  'zhe','zhei','zhen','zheng','',  '','zhou','zhong',  'zhi','',  '','','','','','','','','',  'zhu','zhua','zhuai','zhui','zhuo','zhuan','zhuang','zhun','',  '','','',''],
    ['ch-','cha','chai','chao','chan','chang',  'che','','chen','cheng','',  '','chou','chong',  'chi','',  '','','','','','','','','',  'chu','chua','chuai','chui','chuo','chuan','chuang','chun','',  '','','',''],
    ['sh-','sha','shai','shao','shan','shang',  'she','shei','shen','sheng','',  '','shou','',  'shi','',  '','','','','','','','','',  'shu','shua','shuai','shui','shuo','shuan','shuang','shun','',  '','','',''],
    ['r-', '','','rao','ran','rang',  're','','ren','reng','',  '','rou','rong',  'ri','',  '','','','','','','','','',  'ru','rua','','rui','ruo','ruan','','run','',  '','','',''],
    ['j-', '','','','','',  '','','','','',  '','','',  'ji','',  'jia','jiao','jie','jiu','jian','jiang','jin','jing','jiong',  '','','','','','','','','',  'ju','jue','juan','jun'],
    ['q-', '','','','','',  '','','','','',  '','','',  'qi','',  'qia','qiao','qie','qiu','qian','qiang','qin','qing','qiong',  '','','','','','','','','',  'qu','que','quan','qun'],
    ['x-', '','','','','',  '','','','','',  '','','',  'xi','',  'xia','xiao','xie','xiu','xian','xiang','xin','xing','xiong',  '','','','','','','','','',  'xu','xue','xuan','xun'],
    ['g-', 'ga','gai','gao','gan','gang',  'ge','gei','gen','geng','',  '','gou','gong',  '','',  '','','','','','','','','',  'gu','gua','guai','gui','guo','guan','guang','gun','',  '','','',''],
    ['k-', 'ka','kai','kao','kan','kang',  'ke','kei','ken','keng','',  '','kou','kong',  '','',  '','','','','','','','','',  'ku','kua','kuai','kui','kuo','kuan','kuang','kun','',  '','','',''],
    ['h-', 'ha','hai','hao','han','hang',  'he','hei','hen','heng','',  '','hou','hong',  '','',  '','','','','','','','','',  'hu','hua','huai','hui','huo','huan','huang','hun','',  '','','',''],
  ];

  const table = document.getElementById('pinyin-table');

  // Build header
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  const cornerTh = document.createElement('th');
  cornerTh.className = 'initial-header';
  cornerTh.textContent = '';
  headerRow.appendChild(cornerTh);
  finals.forEach(f => {
    const th = document.createElement('th');
    th.textContent = f;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  // Build body
  const tbody = document.createElement('tbody');
  rows.forEach(row => {
    const tr = document.createElement('tr');
    const initial = row[0];
    const cells = row.slice(1);

    const initTd = document.createElement('td');
    initTd.className = 'initial';
    initTd.textContent = initial;
    tr.appendChild(initTd);

    cells.forEach(cell => {
      const td = document.createElement('td');
      if (!cell) {
        td.className = 'empty';
        td.textContent = '·';
      } else {
        td.textContent = cell;
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
</script>
</body>
</html>
